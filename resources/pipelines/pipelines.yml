variables:
  env_name: { description: "Environment context" }
  catalog_name: { description: "Target Unity Catalog" }
  is_dev_mode: { description: "DLT development mode flag" }

resources:
  pipelines:
    # BRONZE PIPELINE
    dlt_bronze:
      name: "${bundle.name}_bronze_ingestion"
      catalog: ${var.catalog_name}
      target: "bronze" # Explicitly targets the bronze schema
      continuous: false
      development: ${var.is_dev_mode}
      serverless: true

      configuration:
        fw.catalog_name: ${var.catalog_name}

      # ENFORCES SERVICE PRINCIPAL EXECUTION IDENTITY
      run_as:
        service_principal_name: "563a4545-bb88-4c4d-89b8-8714ec7e2232"
      libraries:
        - file: { path: ../../src/pipelines/bronze/01_bronze.py }

    # SILVER PIPELINE
    dlt_silver:
      name: "${bundle.name}_silver_cleansing"
      catalog: ${var.catalog_name}
      target: "silver" # Explicitly targets the silver schema
      continuous: false
      development: ${var.is_dev_mode}
      serverless: true

      configuration:
        fw.catalog_name: ${var.catalog_name}

      # ENFORCES SERVICE PRINCIPAL EXECUTION IDENTITY
      run_as:
        service_principal_name: "563a4545-bb88-4c4d-89b8-8714ec7e2232"
      libraries:
        - file: { path: ../../src/pipelines/silver/silver_customers.py }
        - file: { path: ../../src/pipelines/silver/silver_order_items.py }
        - file: { path: ../../src/pipelines/silver/silver_order_payments.py }
        - file: { path: ../../src/pipelines/silver/silver_orders.py }
        - file: { path: ../../src/pipelines/silver/silver_products.py }
        - file: { path: ../../src/pipelines/silver/silver_sellers.py }

    dlt_gold:
      name: "${bundle.name}_gold_analytics"
      catalog: ${var.catalog_name}
      target: "gold"
      continuous: false
      development: ${var.is_dev_mode}
      serverless: true

      configuration:
        fw.catalog_name: ${var.catalog_name}
      
      # ENFORCES SERVICE PRINCIPAL EXECUTION IDENTITY
      run_as:
        service_principal_name: "563a4545-bb88-4c4d-89b8-8714ec7e2232"

      libraries:
        - file: { path: ../../src/pipelines/gold/gold_dim_products.py }
        - file: { path: ../../src/pipelines/gold/gold_fact_finops_reconciliation.py }
        - file: { path: ../../src/pipelines/gold/gold_fact_order_line_sales.py }
        - file: { path: ../../src/pipelines/gold/gold_sales_performance_obt.py }

  jobs:
    medallion_orchestrator:
      name: "__1_${bundle.name}_${var.env_name}_medallion_orchestrator"
      
      run_as:
        service_principal_name: "563a4545-bb88-4c4d-89b8-8714ec7e2232"

      tasks:
        # Task 1: Ingest raw data into Bronze
        - task_key: "orchestrate_bronze"
          pipeline_task:
            pipeline_id: ${resources.pipelines.dlt_bronze.id}

        # Task 2: Process cleansed data into Silver (Triggers after Bronze completes)
        - task_key: "orchestrate_silver"
          depends_on:
            - task_key: "orchestrate_bronze"
          pipeline_task:
            pipeline_id: ${resources.pipelines.dlt_silver.id}

        # Task 3: Aggregate dimension/fact data into Gold (Triggers after Silver completes)
        - task_key: "orchestrate_gold"
          depends_on:
            - task_key: "orchestrate_silver"
          pipeline_task:
            pipeline_id: ${resources.pipelines.dlt_gold.id}       