# BOOTSTRAP JOB
resources:
  jobs:
    infra_tier2_bootstrap:
      name: "__0__${var.env_name}_${bundle.name}_tier2_bootstrap"
      
      run_as:
        service_principal_name: ${var.pipeline_spn}

      tasks:
        - task_key: "execute_structural_ddl"
          spark_python_task:
            python_file: "../../src/bootstrap/uc_bootstrap.py" 
            parameters:
              - "--catalog_name"
              - "${var.catalog_name}"
              - "--landing_loc"
              - "abfss://landing-zone@${var.storage_account}.dfs.core.windows.net/"
              - "--checkpoint_loc"
              - "abfss://system-zone@${var.storage_account}.dfs.core.windows.net/checkpoints/"              
          environment_key: "default"

      environments:
        - environment_key: "default"
          spec:
            client: "1"